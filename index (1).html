<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日翊資金水位控管 — 115年4月・5月</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Microsoft JhengHei','PingFang TC','Helvetica Neue',Arial,sans-serif;background:#F4F6F9;color:#1a1a1a;-webkit-font-smoothing:antialiased}
  .header{background:linear-gradient(135deg,#1B3A5C 0%,#2E6DA4 100%);color:white;padding:24px 32px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .header h1{font-size:22px;font-weight:600;margin-bottom:4px;letter-spacing:1px}
  .header p{font-size:13px;opacity:.85}
  .container{max-width:1100px;margin:0 auto;padding:24px 18px}
  .unit-banner{background:#1B3A5C;color:white;text-align:center;padding:9px 0;border-radius:6px;font-size:14px;font-weight:600;margin-bottom:18px;letter-spacing:1.5px}
  .tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:2px solid #D0D7E2}
  .tab{padding:10px 24px;font-size:14px;font-weight:500;border:1px solid #D0D7E2;border-bottom:none;
       border-radius:6px 6px 0 0;cursor:pointer;background:#EEF1F6;color:#5A6A7E;transition:all .15s;position:relative;display:flex;align-items:center}
  .tab:hover{background:#E2E8F0}
  .tab.active{background:white;color:#1B3A5C;font-weight:600;border-color:#B5C2D5}
  .tab.has-alert{border-color:#E24B4A}
  .alert-badge{display:inline-block;background:#E24B4A;color:white;border-radius:50%;width:20px;height:20px;
               font-size:12px;font-weight:700;line-height:20px;text-align:center;margin-left:8px;
               box-shadow:0 1px 3px rgba(226,75,74,.5)}
  .panel{display:none}.panel.active{display:block}
  .alert-bar{border-radius:8px;padding:14px 20px;margin-bottom:14px;font-size:16px;font-weight:500;display:flex;align-items:center;gap:10px}
  .alert-bar.danger{background:#FCEBEB;color:#A32D2D;border:1px solid #F5B5B5}
  .alert-bar.warn{background:#FFF3E0;color:#B96A00;border:1px solid #FFD9A8}
  .alert-bar.ok{background:#E8F5E9;color:#2E7D32;border:1px solid #B7DCBA}
  .gap-bar{border-radius:8px;padding:14px 20px;margin-bottom:16px;font-size:16px;
           background:#FCEBEB;color:#A32D2D;border:1px solid #F5B5B5}
  .suggest-box{background:#fff;border:2px solid #E24B4A;border-radius:8px;padding:14px 18px;margin-top:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .suggest-label{font-size:14px;color:#A32D2D;font-weight:600;display:flex;align-items:center;gap:6px}
  .suggest-amount{font-size:24px;color:#A32D2D;font-weight:700;letter-spacing:.5px}
  .suggest-formula{font-size:13px;color:#7A8A9E}
  .gap-days{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .gap-chip{background:#E24B4A;color:white;border-radius:14px;padding:4px 13px;font-size:13px;font-weight:600;box-shadow:0 1px 2px rgba(226,75,74,.3)}
  .threshold-info{font-size:13px;color:#5A6A7E;margin-bottom:14px;padding:10px 14px;background:#F0F4F8;border-radius:6px;border-left:3px solid #9AA8B8}
  .threshold-info b{color:#1B3A5C}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .kpi{background:white;border-radius:8px;padding:14px 18px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .kpi.danger{background:#FCEBEB;border:1px solid #F5B5B5}
  .kpi-label{font-size:15px;color:#7A8A9E;margin-bottom:6px}
  .kpi-val{font-size:26px;font-weight:600;color:#1B3A5C;letter-spacing:.3px}
  .kpi.danger .kpi-val{color:#A32D2D}
  .kpi-sub{font-size:14px;margin-top:4px;color:#9AA8B8}
  .kpi.danger .kpi-sub{color:#C25555}
  .card{background:white;border-radius:10px;padding:18px 22px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:16px}
  .section-title{font-size:13px;font-weight:600;color:#7A8A9E;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
  .section-title .unit{font-size:11px;color:#9AA8B8;margin-left:8px;font-weight:400;text-transform:none;letter-spacing:0}
  .chart-wrap{position:relative;width:100%;height:300px}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
  .pie-wrap{position:relative;width:100%;height:220px}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px;font-size:12px;color:#5A6A7E}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{width:14px;height:3px;display:inline-block;flex-shrink:0;border-radius:2px}
  .legend i.bgblock{height:11px;border-radius:2px}
  .legend i.dashed{height:0;border-top:2px dashed currentColor;width:18px}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#EEF1F6;color:#1B3A5C;padding:8px 6px;font-weight:600;text-align:right;border-bottom:2px solid #B5C2D5;white-space:nowrap}
  th:first-child,th:nth-child(2){text-align:center}
  td{padding:7px 6px;text-align:right;border-bottom:1px solid #ECEEF2;white-space:nowrap}
  td:first-child,td:nth-child(2){text-align:center;font-weight:500}
  tr.weekend{background:#F4F6F9}
  td.deposit-neg{background:#FCEBEB;color:#A32D2D;font-weight:700}
  td.deposit-warn{color:#B96A00;font-weight:600}
  td.deposit-ok{font-weight:500}
  td.net-pos{color:#2E7D32}
  td.net-neg{color:#A32D2D}
  td.weekend-tag{color:#9AA8B8;font-size:11px}
  tr.total-row td{background:#1B3A5C;color:white;font-weight:700;border-bottom:none}
  tr.total-row td:first-child{text-align:center}
  .col-divider{border-left:2px solid #D0D7E2 !important}
  @media (max-width:760px){
    .header{padding:18px 16px}
    .header h1{font-size:18px}
    .container{padding:16px 10px}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .two-col{grid-template-columns:1fr}
    .kpi-val{font-size:22px}
    .tab{padding:9px 16px;font-size:13px}
    .alert-bar,.gap-bar{font-size:14px;padding:11px 14px}
    .suggest-amount{font-size:20px}
  }
</style>
</head>

};

const monthName = (m) => `${m}月`;

// 建立頁籤
const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');

const months = [
  {key:'prev', data:DATA.prev, label:monthName(DATA.prev.month)},
  {key:'this', data:DATA.this, label:monthName(DATA.this.month)},
];

months.forEach((m, idx) => {
  const tab = document.createElement('div');
  tab.className = 'tab' + (idx === 1 ? ' active' : '');
  const hasGap = m.data.kpis.gap_count > 0;
  if (hasGap) tab.classList.add('has-alert');
  tab.innerHTML = `${m.label}` + (hasGap ? '<span class="alert-badge">!</span>' : '');
  tab.dataset.target = m.key;
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+m.key).classList.add('active');
  };
  tabsEl.appendChild(tab);
});

// 渲染面板
months.forEach((m, idx) => {
  const panel = document.createElement('div');
  panel.className = 'panel' + (idx === 1 ? ' active' : '');
  panel.id = 'panel-' + m.key;
  panel.innerHTML = renderPanel(m.key, m.data);
  panelsEl.appendChild(panel);
});

function renderPanel(key, d){
  const k = d.kpis;
  const hasGap = k.gap_count > 0;
  const closing = k.closing;

  // 警示長條
  let alertBar = '';
  if (closing < 0) {
    alertBar = `<div class="alert-bar danger">⚠ 月底餘額為負數 ${fmt(closing)}，資金嚴重不足，需立即調度！</div>`;
  } else if (closing < THRESHOLD) {
    alertBar = `<div class="alert-bar warn">⚠ 月底餘額 ${fmt(closing)}（低於警戒水位 $${fmt(THRESHOLD)}）</div>`;
  } else {
    alertBar = `<div class="alert-bar ok">✓ 月底餘額 ${fmt(closing)} 正常</div>`;
  }

  // 資金缺口警示欄
  let gapBar = '';
  if (hasGap) {
    const suggest = Math.abs(k.max_gap) + THRESHOLD;
    const chips = k.gap_day_list.map(g => `<span class="gap-chip">${d.month}/${g.day}　${fmt(g.deposit)}</span>`).join('');
    gapBar = `
      <div class="gap-bar">
        <div>⚠ <b>需要資金調度！</b>本月共 <b>${k.gap_count}</b> 天出現資金缺口（餘額小於 0），最大缺口 <b>${fmt(k.max_gap)}</b>（${d.month}月${k.max_gap_day}日）</div>
        <div class="suggest-box">
          <div class="suggest-label">💰 建議調撥金額</div>
          <div class="suggest-amount">$${fmt(suggest)}</div>
          <div class="suggest-formula">＝ 最大缺口 $${fmt(Math.abs(k.max_gap))} + 警戒水位 $${fmt(THRESHOLD)}</div>
        </div>
        <div class="gap-days">${chips}</div>
      </div>`;
  }

  // KPI 四格
  const kpi4Class = hasGap ? 'kpi danger' : 'kpi';
  const kpi4 = hasGap
    ? `<div class="${kpi4Class}"><div class="kpi-label">資金缺口天數</div><div class="kpi-val">${k.gap_count} 天</div><div class="kpi-sub">需資金調撥</div></div>`
    : `<div class="kpi"><div class="kpi-label">月最低餘額</div><div class="kpi-val">${fmt(k.min_bal)}</div><div class="kpi-sub">仟元</div></div>`;

  const kpis = `
    <div class="kpis">
      <div class="kpi"><div class="kpi-label">月初餘額</div><div class="kpi-val">${fmt(k.opening)}</div><div class="kpi-sub">仟元</div></div>
      <div class="kpi"><div class="kpi-label">月底餘額</div><div class="kpi-val">${fmt(k.closing)}</div><div class="kpi-sub">仟元</div></div>
      <div class="kpi"><div class="kpi-label">月最高餘額</div><div class="kpi-val">${fmt(k.max_bal)}</div><div class="kpi-sub">仟元</div></div>
      ${kpi4}
    </div>`;

  const thresholdInfo = `<div class="threshold-info">📌 警戒水位固定為 <b>$${fmt(THRESHOLD)}</b>（仟元），月底餘額或日餘額低於此值將觸發警示</div>`;

  // 趨勢圖卡片
  const trendCard = `
    <div class="card">
      <div class="section-title">每日銀行存款餘額趨勢<span class="unit">（單位：仟元）</span></div>
      <div class="legend">
        <span><i class="bgblock" style="background:rgba(180,20,20,0.45)"></i>資金缺口警示區</span>
        <span><i class="dashed" style="color:#E24B4A"></i>警戒水位 $${fmt(THRESHOLD)}</span>
        <span><i class="dashed" style="color:#7A1F1F"></i>零基線</span>
      </div>
      <div class="chart-wrap"><canvas id="trend-${key}"></canvas></div>
    </div>`;

  // 收付明細表
  const detailCard = `
    <div class="card">
      <div class="section-title">每日收付明細<span class="unit">（單位：仟元）</span></div>
      <div class="table-wrap">${renderTable(d)}</div>
    </div>`;

  // 收入/支出甜甜圈
  const pieCard = `
    <div class="two-col">
      <div class="card">
        <div class="section-title">月度收入分布<span class="unit">（單位：仟元）</span></div>
        <div class="pie-wrap"><canvas id="income-${key}"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title">月度支出分布<span class="unit">（單位：仟元）</span></div>
        <div class="pie-wrap"><canvas id="expense-${key}"></canvas></div>
      </div>
    </div>`;

  return alertBar + gapBar + thresholdInfo + kpis + trendCard + pieCard + detailCard;
}

function renderTable(d) {
  const incNames = ['一般商品收入','加熱菸銷貨款','EC代收款','其他'];
  const expNames = ['一般商品進貨','加熱菸進貨款','EC代付款','其他'];
  let html = '<table><thead><tr>';
  html += '<th>日期</th><th>星期</th>';
  incNames.forEach(n => html += `<th>${n}</th>`);
  html += '<th class="col-divider">流入合計</th>';
  expNames.forEach(n => html += `<th>${n}</th>`);
  html += '<th class="col-divider">流出合計</th>';
  html += '<th class="col-divider">當日淨流入(出)</th>';
  html += '<th class="col-divider">當日銀行存款</th>';
  html += '</tr></thead><tbody>';

  d.rows.forEach(r => {
    const wknd = r.weekend;
    const trClass = wknd ? 'weekend' : '';
    let depClass = 'deposit-ok';
    if (r.deposit < 0) depClass = 'deposit-neg';
    else if (r.deposit < THRESHOLD) depClass = 'deposit-warn';
    const netClass = r.net > 0 ? 'net-pos' : (r.net < 0 ? 'net-neg' : '');
    html += `<tr class="${trClass}">`;
    html += `<td>${d.month}/${r.day}</td>`;
    html += `<td class="weekend-tag">${wknd ? '休' : ''}</td>`;
    incNames.forEach(n => html += `<td>${r.income[n] ? fmt(r.income[n]) : '-'}</td>`);
    html += `<td class="col-divider">${fmt(r.inflow_total)}</td>`;
    expNames.forEach(n => html += `<td>${r.expense[n] ? fmt(r.expense[n]) : '-'}</td>`);
    html += `<td class="col-divider">${fmt(r.outflow_total)}</td>`;
    html += `<td class="col-divider ${netClass}">${r.net !== 0 ? fmt(r.net) : '-'}</td>`;
    html += `<td class="col-divider ${depClass}">${fmt(r.deposit)}</td>`;
    html += `</tr>`;
  });

  // 合計列
  html += `<tr class="total-row">`;
  html += `<td colspan="2">合計</td>`;
  incNames.forEach(n => html += `<td>${fmt(d.income_totals[n])}</td>`);
  html += `<td class="col-divider">${fmt(d.sum_inflow)}</td>`;
  expNames.forEach(n => html += `<td>${fmt(d.expense_totals[n])}</td>`);
  html += `<td class="col-divider">${fmt(d.sum_outflow)}</td>`;
  html += `<td class="col-divider">${fmt(d.sum_inflow - d.sum_outflow)}</td>`;
  html += `<td class="col-divider">-</td>`;
  html += `</tr>`;

  html += '</tbody></table>';
  return html;
}

// =============== 圖表繪製 ===============
const negBgPlugin = {
  id: 'negBgPlugin',
  beforeDatasetsDraw(chart) {
    const {ctx, chartArea, scales} = chart;
    if (!chartArea || !scales.x || !scales.y) return;
    const yZero = scales.y.getPixelForValue(0);
    const yBottom = scales.y.getPixelForValue(scales.y.min);
    const dataset = chart.data.datasets[0];
    if (!dataset) return;
    const labels = chart.data.labels;
    ctx.save();
    dataset.data.forEach((v, i) => {
      if (v < 0) {
        const x = scales.x.getPixelForValue(i);
        const half = (scales.x.getPixelForValue(1) - scales.x.getPixelForValue(0)) / 2;
        const x1 = x - half;
        const w = half * 2;
        ctx.fillStyle = 'rgba(180,20,20,0.45)';
        ctx.fillRect(x1, chartArea.top, w, chartArea.bottom - chartArea.top);
        // 缺口文字
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px Microsoft JhengHei, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('缺口', x, chartArea.top + 14);
      }
    });
    ctx.restore();
  }
};

function drawTrend(canvasId, d) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const labels = d.rows.map(r => `${d.month}/${r.day}`);
  const values = d.rows.map(r => r.deposit);
  const pointColors = values.map(v => v < 0 ? '#C62828' : (v < THRESHOLD ? '#F57C00' : '#1976D2'));
  const minY = Math.min(...values, 0);
  const maxY = Math.max(...values, THRESHOLD);

  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '當日銀行存款',
          data: values,
          borderColor: '#1976D2',
          backgroundColor: 'rgba(25,118,210,0.08)',
          borderWidth: 2,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0.25,
          fill: true,
        },
        {
          label: '警戒水位',
          data: values.map(_ => THRESHOLD),
          borderColor: '#E24B4A',
          borderWidth: 1.5,
          borderDash: [6,4],
          pointRadius: 0,
          fill: false,
        },
        {
          label: '零基線',
          data: values.map(_ => 0),
          borderColor: '#7A1F1F',
          borderWidth: 1.5,
          borderDash: [4,4],
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {intersect:false, mode:'index'},
      plugins: {
        legend: {display:false},
        tooltip: {
          callbacks: {
            label: (item) => `${item.dataset.label}：${fmt(item.parsed.y)}`
          }
        }
      },
      scales: {
        x: {
          ticks:{font:{size:10},maxRotation:0,autoSkipPadding:8},
          grid:{display:false}
        },
        y: {
          ticks:{font:{size:11}, callback:v=>fmt(v)},
          grid:{color:'#ECEEF2'},
          suggestedMin: minY < 0 ? minY * 1.15 : 0,
          suggestedMax: maxY * 1.05
        }
      }
    },
    plugins: [negBgPlugin]
  });
}

const INCOME_COLORS = ['#0D47A1','#1976D2','#64B5F6','#B3E5FC'];
const EXPENSE_COLORS = ['#BF360C','#E64A19','#FF8A65','#FFCCBC'];

function drawDoughnut(canvasId, totals, colors) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const labels = Object.keys(totals);
  const values = labels.map(k => totals[k]);
  new Chart(ctx, {
    type: 'doughnut',
    data: {labels, datasets:[{data:values, backgroundColor:colors, borderWidth:2, borderColor:'#fff'}]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {position:'right', labels:{font:{size:11}, boxWidth:12, padding:8}},
        tooltip: {
          callbacks: {
            label: (item) => {
              const total = item.dataset.data.reduce((a,b)=>a+b,0);
              const pct = total > 0 ? (item.parsed/total*100).toFixed(1) : 0;
              return `${item.label}：${fmt(item.parsed)} 仟元（${pct}%）`;
            }
          }
        }
      },
      cutout: '55%'
    }
  });
}

// 等 DOM 全部插入後再繪製圖表
setTimeout(() => {
  drawTrend('trend-prev', DATA.prev);
  drawTrend('trend-this', DATA.this);
  drawDoughnut('income-prev', DATA.prev.income_totals, INCOME_COLORS);
  drawDoughnut('expense-prev', DATA.prev.expense_totals, EXPENSE_COLORS);
  drawDoughnut('income-this', DATA.this.income_totals, INCOME_COLORS);
  drawDoughnut('expense-this', DATA.this.expense_totals, EXPENSE_COLORS);
}, 0);
</script>
